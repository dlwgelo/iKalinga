name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "osca-voice-assistant-v2/frontend/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "osca-voice-assistant-v2/frontend/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        # This tells every 'run' step to start inside your app folder
        working-directory: osca-voice-assistant-v2/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: osca-voice-assistant-v2/frontend/requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf build-essential git libbz2-dev libffi-dev \
            libgdbm-dev liblzma-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libsqlite3-dev libssl-dev pkg-config \
            tk-dev unzip zip zlib1g-dev

      - name: Install Buildozer tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer==1.5.0" "cython==0.29.33"

      - name: Build debug APK
        # We use 'yes |' to automatically accept SDK licenses during the build
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ikalinga-debug-apk
          # Since the working-directory is already frontend, we look in bin/
          path: osca-voice-assistant-v2/frontend/bin/*.apk
          if-no-files-found: error
